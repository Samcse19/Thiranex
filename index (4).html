<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#74b9ff,#0984e3);
}

.container{
    width:400px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#2d3436;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    background:#0984e3;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0768b3;
}

.weather-card{
    background:#f1f9ff;
    padding:15px;
    border-radius:10px;
    text-align:left;
}

.weather-card p{
    margin:10px 0;
    font-size:18px;
}

.hidden{
    display:none;
}

#error{
    color:red;
    margin-bottom:10px;
}

#loading{
    color:#0984e3;
    margin-bottom:10px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <h1>🌤 Weather Dashboard</h1>

    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name">
        <button id="searchBtn">Search</button>
    </div>

    <div id="loading" class="hidden">Loading...</div>
    <div id="error" class="hidden"></div>

    <div id="weatherCard" class="weather-card hidden">
        <h2 id="cityName"></h2>
        <p>🌡 Temperature: <span id="temperature"></span> °C</p>
        <p>💧 Humidity: <span id="humidity"></span> %</p>
        <p>💨 Wind Speed: <span id="windSpeed"></span> km/h</p>
        <p>☁ Condition: <span id="condition"></span></p>
    </div>
</div>

<script>
const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");

const weatherCard = document.getElementById("weatherCard");
const cityName = document.getElementById("cityName");
const temperature = document.getElementById("temperature");
const humidity = document.getElementById("humidity");
const windSpeed = document.getElementById("windSpeed");
const condition = document.getElementById("condition");

const loading = document.getElementById("loading");
const error = document.getElementById("error");

async function fetchWeather(city) {
    try {
        loading.classList.remove("hidden");
        error.classList.add("hidden");
        weatherCard.classList.add("hidden");

        // Get city coordinates
        const geoResponse = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`
        );

        const geoData = await geoResponse.json();

        if (!geoData.results || geoData.results.length === 0) {
            throw new Error("City not found");
        }

        const place = geoData.results[0];

        // Get weather data
        const weatherResponse = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code`
        );

        const weatherData = await weatherResponse.json();

        cityName.textContent = `${place.name}, ${place.country}`;

        temperature.textContent =
            weatherData.current.temperature_2m;

        humidity.textContent =
            weatherData.current.relative_humidity_2m;

        windSpeed.textContent =
            weatherData.current.wind_speed_10m;

        condition.textContent =
            getWeatherCondition(weatherData.current.weather_code);

        weatherCard.classList.remove("hidden");

    } catch (err) {
        error.textContent = err.message;
        error.classList.remove("hidden");
    } finally {
        loading.classList.add("hidden");
    }
}

function getWeatherCondition(code) {
    const weatherCodes = {
        0: "Clear Sky",
        1: "Mainly Clear",
        2: "Partly Cloudy",
        3: "Overcast",
        45: "Fog",
        48: "Fog",
        51: "Light Drizzle",
        53: "Moderate Drizzle",
        55: "Dense Drizzle",
        61: "Slight Rain",
        63: "Moderate Rain",
        65: "Heavy Rain",
        71: "Slight Snow",
        73: "Moderate Snow",
        75: "Heavy Snow",
        80: "Rain Showers",
        81: "Moderate Showers",
        82: "Violent Showers",
        95: "Thunderstorm"
    };

    return weatherCodes[code] || "Unknown";
}

searchBtn.addEventListener("click", () => {
    const city = cityInput.value.trim();

    if (!city) {
        error.textContent = "Please enter a city name";
        error.classList.remove("hidden");
        return;
    }

    fetchWeather(city);
});

cityInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
        searchBtn.click();
    }
});
</script>

</body>
</html>
